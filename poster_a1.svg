  <text x="440" y="723" class="body">Scan to access the GitHub repository</text>
  <text x="440" y="735" class="tiny">github.com/MFDOOMs/Tugas-UAS-AI-kelompok-API</text>

  <!-- Footer -->
  <rect class="navy" x="24" y="765" width="546" height="38" rx="5"/>
  <text x="36" y="785" class="whiteSmall">AI-Based Learning Style Report: VAK Questionnaire System</text>
  <text x="36" y="795" class="whiteTiny">Program Studi Teknik Informatika • Universitas Padjadjaran (UNPAD) • Repository: https://github.com/MFDOOMs/Tugas-UAS-AI-kelompok-API</text>
</svg>
